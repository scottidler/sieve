max-results: 500
waves:
  the-daily:
    query: in:INBOX newer_than:1w
    spammers:
      sender:
      - calendar-notification@google.com
      to:
      - patrick@tatari.tv
      - techplans@tatari.tv
      - eng-accounts@tatari.tv
      - eng-stats-recipients@tatari.tv
      - noreply.github.com
      fr:
      - tatari.atlassian.net
      - linkedin.com
      - github.com
    filters:
      shipped:
        subject: '[Shipped]'
        actions:
        - _/shipped
      superiors:
        to: me
        fr:
        - scott@tatari.tv
        - muller@tatari.tv
        - philip@tatari.tv
        actions:
        - inbox
        - star
      only-me:
        to: me
        cc: []
        fr: tatari.tv
        actions:
        - inbox
        - star
      sre-team:
        to: me
        fr:
        - list:sre@tatari.tv
        - willis.schubert@tatari.tv
        actions:
        - inbox
        - star
      default:
        actions:
        - archive
  inbox-to-archive:
    query: in:INBOX -is:IMPORTANT -is:STARRED older_than:1w
    filters:
      archive-it:
        actions:
        - archive
  archive-to-trash:
    query: -in:INBOX older_than:3m
    filters:
      trash-it:
        actions:
        - trash
